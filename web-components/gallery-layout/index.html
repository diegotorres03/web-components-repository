<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER-GALLERY</title>

    <link rel="stylesheet" href="../style-tools.css">


    <style>
        * {
            --dark-1: #1a1a1a;
            --dark-2: #292929;
            --dark-3: #373737;
            --main-tone: #ebe59c;
            --text-tone1: #efeff5;
            --text-tone2: #8a8a8f;

            font-family: 'Source Sans Pro', sans-serif;
        }

        .active {
            outline: 1px solid var(--main-tone);
        }

        .gallery-container {
            background-color: var(--dark-1);
        }

        .main-display {
            height: 70vh;
            padding: 12px;

            box-shadow: 0 0 12px rgb(178, 178, 178);
        }

        .main-display img {
            width: 50%;
            background-color: var(--dark-2);
            border-radius: 4px;
        }

        .image-list-container {
            height: 30vh;
            padding: 12px;




            background-color: var(--dark-2);
        }

        .image-list {
            width: 100%;
            height: 100%;
            padding: 8px;

            overflow-x: auto;
            overflow-y: hidden;

            gap: 12px;
            background-color: var(--dark-3);
        }

        .image-card {
            min-width: calc(100% / 7 - 10.5px);
            height: 100%;

            display: grid;
            grid-template-rows: 100% 0%;

            border-radius: 4px;

            overflow: hidden;
            transition: all 400ms;
        }

        .image-card:hover {
            grid-template-rows: calc(100% - 40px) 40px;
            cursor: pointer;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        figcaption {
            height: 100%;
            padding: 12px 8px;

            font-size: 14px;
            line-height: 14px;

            background-color: var(--dark-1);
            color: var(--main-tone);
        }

        .image-list::-webkit-scrollbar {
            -webkit-appearance: none;
        }

        .image-list::-webkit-scrollbar:vertical {
            width: 8px;
        }

        .image-list::-webkit-scrollbar-button:increment,
        .contenedor::-webkit-scrollbar-button {
            display: none;
        }

        .image-list::-webkit-scrollbar-thumb {
            background-color: var(--main-tone);
            border: 1px solid var(--dark-2);
            border-radius: 3px;
            cursor: pointer;
        }

        .image-list::-webkit-scrollbar-track {
            border-radius: 10px;
        }
    </style>
</head>
